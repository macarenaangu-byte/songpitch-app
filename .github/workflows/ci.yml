name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          CI: true
          REACT_APP_SUPABASE_URL: https://placeholder.supabase.co
          REACT_APP_SUPABASE_ANON_KEY: placeholder-key-for-ci-build

      - name: Test
        run: npm test -- --passWithNoTests --watchAll=false
        env:
          CI: true
